name: Release-plz

# On every push to main, release-plz maintains a "Release PR" (version bump +
# CHANGELOG.md) and, when that PR is merged, publishes to crates.io, pushes the
# vX.Y.Z tag, and cuts the GitHub Release from the changelog. Attaching binaries
# to that release is handled separately by cd.yml, triggered by the published
# release — which is why this runs under a PAT: a release published with the
# default GITHUB_TOKEN cannot trigger further workflow runs.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # release-plz needs full history for the changelog
          persist-credentials: false
      - name: Install ALSA headers (rodio build dependency)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          # PAT (Contents + Pull requests: read & write) stored as a secret, so
          # the release it publishes can trigger cd.yml. See release-plz token docs.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
