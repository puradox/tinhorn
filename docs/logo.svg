<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 108" width="480" height="216">
  <title>tinhorn — a dice cup for your terminal</title>

  <!-- the terminal window -->
  <rect x="28" y="6" width="184" height="96" rx="8" fill="#26292E" stroke="#5F6973" stroke-width="1"/>
  <circle cx="44" cy="19" r="3" fill="#5F6973"/>
  <circle cx="56" cy="19" r="3" fill="#5F6973"/>
  <circle cx="68" cy="19" r="3" fill="#E3A93C"/>
  <line x1="28" y1="29" x2="212" y2="29" stroke="#3A3F45" stroke-width="1"/>

  <!-- the command -->
  <text x="44" y="58" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="15" font-weight="bold">
    <tspan fill="#8A93A0">$ </tspan><tspan fill="#EFE6D6">tin</tspan><tspan fill="#E3A93C">horn</tspan></text>

  <!-- block cursor: an amber d6 showing a three -->
  <rect x="129" y="45" width="14" height="14" fill="#E3A93C"/>
  <rect x="131.5" y="47.5" width="3" height="3" fill="#33302B"/>
  <rect x="134.5" y="50.5" width="3" height="3" fill="#33302B"/>
  <rect x="137.5" y="53.5" width="3" height="3" fill="#33302B"/>

  <!-- the program answers for itself -->
  <text x="44" y="76" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="9" fill="#8A93A0">a dice cup for your terminal</text>
</svg>
