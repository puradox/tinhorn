[package]
name = "roll"
version = "0.1.0"
edition = "2021"
description = "A TUI dice roller with bouncing dice"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
rand = "0.8"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rodio = { version = "0.22.2", default-features = false, features = ["playback"] }

[profile.release]
opt-level = 3
lto = true
