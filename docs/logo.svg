<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 22" width="480" height="352" shape-rendering="crispEdges">
  <title>tinhorn — a tin cup throwing dice</title>

  <!-- rattle sparks around the cup -->
  <g fill="#E3A93C">
    <rect x="2" y="8" width="1" height="1"/>
    <rect x="1" y="11" width="1" height="1"/>
    <rect x="13" y="11" width="1" height="1"/>
  </g>

  <!-- the tin cup: flared rim, straight body, pressed rib, base -->
  <g>
    <rect x="3"  y="9"  width="9" height="1" fill="#C7CFD6"/>
    <rect x="4"  y="10" width="7" height="8" fill="#9DA7B0"/>
    <rect x="4"  y="10" width="1" height="8" fill="#C7CFD6"/>
    <rect x="10" y="10" width="1" height="8" fill="#78828C"/>
    <rect x="4"  y="13" width="7" height="1" fill="#78828C"/>
    <rect x="4"  y="18" width="7" height="1" fill="#5F6973"/>
  </g>

  <!-- flight trail out of the cup -->
  <g fill="#8A93A0">
    <rect x="10" y="6" width="1" height="1" opacity="0.30"/>
    <rect x="13" y="4" width="1" height="1" opacity="0.45"/>
    <rect x="16" y="3" width="1" height="1" opacity="0.60"/>
  </g>

  <!-- a small d4 just clearing the rim -->
  <g>
    <rect x="7" y="5" width="1" height="1" fill="#D9CDBA"/>
    <rect x="6" y="6" width="3" height="1" fill="#C9BCA4"/>
  </g>

  <!-- the d6: bone white, five pips, self-shadowed pixel style -->
  <g>
    <rect x="19" y="1" width="5" height="5" fill="#EFE6D6"/>
    <rect x="19" y="5" width="5" height="1" fill="#C9BCA4"/>
    <rect x="23" y="1" width="1" height="5" fill="#C9BCA4"/>
    <g fill="#33302B">
      <rect x="20" y="2" width="1" height="1"/>
      <rect x="22" y="2" width="1" height="1"/>
      <rect x="21" y="3" width="1" height="1"/>
      <rect x="20" y="4" width="1" height="1"/>
      <rect x="22" y="4" width="1" height="1"/>
    </g>
  </g>

  <!-- the d20: amber pixel hexagon, shaded toward its base -->
  <g>
    <rect x="24" y="7"  width="2" height="1" fill="#E3A93C"/>
    <rect x="23" y="8"  width="4" height="1" fill="#E3A93C"/>
    <rect x="22" y="9"  width="6" height="1" fill="#E3A93C"/>
    <rect x="22" y="10" width="6" height="1" fill="#E3A93C"/>
    <rect x="23" y="11" width="4" height="1" fill="#C68F2B"/>
    <rect x="24" y="12" width="2" height="1" fill="#B27E22"/>
  </g>

  <!-- wordmark -->
  <text x="15" y="21.4" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="3.1" font-weight="bold" letter-spacing="0.1">
    <tspan fill="#8A93A0">tin</tspan><tspan fill="#E3A93C">horn</tspan>
  </text>
</svg>
