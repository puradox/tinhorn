name: CD # Continuous Deployment

# Attach prebuilt binaries to the GitHub Release that release-plz just published.
# Modeled on release-plz's own releasing-binaries guide, using
# taiki-e/upload-rust-binary-action (the tool that guide recommends).
#
# This only fires because release-plz.yml runs under a PAT — a release published
# by the default GITHUB_TOKEN would not trigger this workflow.

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  upload-assets:
    name: Upload ${{ matrix.target }}
    # Guard: this repo only (skips forks), and version tags only.
    if: github.repository_owner == 'puradox' && startsWith(github.event.release.tag_name, 'v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel # Intel runner
          - target: aarch64-apple-darwin
            os: macos-latest # Apple-silicon runner
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          # aarch64-unknown-linux-gnu is intentionally omitted: rodio links ALSA
          # (libasound), so cross-compiling to another Linux arch needs that C
          # library for the target too — a real lift. Add once these four ship.
    steps:
      - uses: actions/checkout@v4
        # release: published checks out the tagged commit, so the built binary
        # is byte-for-byte the released code; taiki-e reads the tag from the ref.
      - name: Install ALSA headers (rodio build dependency)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: tinhorn
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          tar: unix
          zip: windows
          checksum: sha256
          # Default GITHUB_TOKEN is fine here — uploading assets doesn't need to
          # trigger anything downstream.
          token: ${{ secrets.GITHUB_TOKEN }}
