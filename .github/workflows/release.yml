name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA headers (rodio build dependency)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate" >&2
            exit 1
          fi

      - name: Test
        run: cargo test

      - name: Check whether this version is already on crates.io
        id: published
        run: |
          version="${GITHUB_REF_NAME#v}"
          if curl -sf -H "User-Agent: tinhorn-release (github actions)" \
              -o /dev/null "https://crates.io/api/v1/crates/tinhorn/$version"; then
            echo "$version is already published; skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to crates.io
        if: steps.published.outputs.skip == 'false'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
